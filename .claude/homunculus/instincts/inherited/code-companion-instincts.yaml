# Code Companion Workflow Multi Directory Pip Dependency Bump

## Action

Follow the multi-directory-pip-dependency-bump workflow:
1. Identify directories with requirements.txt or pyproject.toml files.
2. Update dependency versions for specified packages in each file.
3. Commit all updated files together with a message listing updated packages and versions.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: **/requirements.txt, **/pyproject.toml

